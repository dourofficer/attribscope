paths:
  outputs_root: /data/hoang/attrib
  data_root: data/ww
  out_base: /data/hoang/attrib/ceiling

device: cuda

models:
  # - llama-3.1-8b
  - qwen3-8b

subsets:
  - hand-crafted
  - algorithm-generated

reps:
  - name: grads
    pooling: grad
  - name: hidden
    pooling: mean
  - name: hidden
    pooling: last

losses:
  - [ntp,        null]
  - [kl_uniform, null]
  - [kl_temp,    1.2]
  - [kl_temp,    1.4]
  - [kl_temp,    1.6]
  - [kl_temp,    1.8]
  - [kl_temp,    2.0]
  - [kl_temp,    2.2]
  - [kl_temp,    2.4]
  - [kl_temp,    2.6]
  - [kl_temp,    2.8]
  - [kl_temp,    3.0]

modes:
  - A
  - B

split_ratios: [0.3]
split_seeds:  [10, 20, 30, 40, 50]

svd:
  n_components_fit:   10
  n_components_score: null   # null = inferred as range(1, n_components_fit + 1)
  ks: [1, 3, 5, 10]