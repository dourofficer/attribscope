# experiments/configs/default.yaml
# Full SVD sweep. Shrink any list to narrow.

shared:
  models:        [qwen3-8b, llama-3.1-8b]
  rep_kinds:     [hidden, grads]           # → outputs/<rep_kind>/...
  outputs_root:  outputs
  data_dir:      data/ww
  device:        cuda

  # Poolings per rep_kind. Set `poolings` (explicit) to override.
  poolings: null
  poolings_by_rep_kind:
    hidden: [mean, last]
    grads:  [grad]

fit:
  subsets:       [hand-crafted, algorithm-generated]
  n_components:  10

score:
  fit_subsets:         [hand-crafted]
  score_subsets:       [hand-crafted]
  n_components_fit:    10                  # must match fit.n_components
  n_components_score:  all                 # "all" or e.g. [1, 5, 10]
  ks:                  [1, 3, 5, 10]