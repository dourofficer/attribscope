# experiments/svd/configs/fit.yaml
# python -m experiments.svd.run fit --config experiments/svd/configs/fit.yaml --dry-run

shared:
  models:        [qwen3-8b, llama-3.1-8b]
  rep_kinds:     [hidden, grads]           # → outputs/<rep_kind>/...
  outputs_root:  outputs
  data_dir:      data/ww
  device:        cuda

  # Poolings per rep_kind. Set `poolings` (explicit) to override.
  poolings: null
  poolings_by_rep_kind:
    hidden: [mean, last]
    grads:  [grad]

fit:
  subsets:       [hand-crafted, algorithm-generated]
  n_components:  10