# experiments/reps/configs/default.yaml
# Extraction sweep for grads and hidden states.  Shrink any list to narrow.

shared:
  models:   [qwen3-8b, llama-3.1-8b]
  subsets:  [magentic-one, tau-retail]

  outputs_root: outputs
  data_dir:     data/ww
  device:       cuda
  max_tokens:   8192
  dtype:        bfloat16
  context:      all   # "dependency" | "all"

  # Trajectory slice — both are optional (null = no limit).
  start_idx: 0
  end_idx:   1

  # Full paths / HF names for each model shorthand.
  # Use the shorthand directly if the model is on the HF Hub.
  model_paths:
    qwen3-8b:     /data/hoang/resources/models/Qwen/Qwen3-8B
    llama-3.1-8b: /data/hoang/resources/models/meta-llama/Llama-3.1-8B

# ── Gradient extraction ───────────────────────────────────────────────────────
grads:
  # Shorthands like "v/35", "gate/35", or ["all"] for every parameter.
  target_params: ["all"]

  # Loss: "ntp" | "kl_uniform" | "kl_temp"
  loss: kl_temp

  # Temperatures to sweep — only used when loss == kl_temp.
  # Each temperature gets its own output sub-directory: .../grads/<model>/<subset>/t<T>/
  temperatures: [1.2, 1.4]

# ── Hidden-state extraction ───────────────────────────────────────────────────
hidden:
  # Layer shorthands: "embed", "act/<N>", "act/<N>_normed", or ["all"].
  layers: ["all"]

  # Pooling: "last" | "mean" | "all"
  pool: all